name: GolangCI-Lint

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: golangci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golangci:
    name: GolangCI-Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          args: --timeout=5m --build-tags=development ./cmd/... ./internal/... ./pkg/... ./website
